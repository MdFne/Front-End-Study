<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ul>
    <script>
        const ul = document.querySelector('ul')
        // 1.cloneNode()方法用于克隆一个节点，参数是一个布尔值，表示是否深度克隆（即是否克隆子节点）
        const li1 = ul.children[0].cloneNode(true) // 克隆第一个li元素，深度克隆
        const li2 = ul.children[1].cloneNode(false) // 克隆第二个li元素，浅克隆，只克隆元素节点，不克隆子节点
        console.log(li1);

        // 2.appendChild()方法用于将一个节点添加到另一个节点的子节点列表的末尾
        ul.appendChild(li1) // 将克隆的li1添加到ul的末尾
        ul.appendChild(li2) // 将克隆的li2添加到ul的末尾
        // 结果：ul中有5个li元素，分别是1、2、3、1、空
    </script>
</body>

</html>
