<!--     
1. 作用域（Scope）
var：函数作用域（Function Scope）。在函数内部声明的变量仅在函数内有效；在函数外部声明的变量是全局作用域。
let 和 const：块级作用域（Block Scope）。变量仅在声明它的代码块（如 {} 内部）中有效。
// var 的函数作用域
function varExample() {
if (true) {
var a = 10;
}
console.log(a); // 输出 10（变量泄露到函数作用域）
}
varExample();
// let 和 const 的块级作用域
function letConstExample() {
if (true) {
let b = 20;
const c = 30;
console.log(b); // 输出 20
console.log(c); // 输出 30
}
console.log(b); // 报错：b is not defined
console.log(c); // 报错：c is not defined
}
letConstExample();
2. 变量提升（Hoisting）
var：变量声明会被提升到作用域顶部，但初始化（赋值）保留在原地。因此，var变量在声明前使用会返回undefined。
let 和 const：不存在变量提升，声明前访问会触发暂时性死区（Temporal Dead Zone, TDZ），导致报错。
代码示例：

// var 的变量提升
console.log(x); // 输出 undefined（声明被提升，但未赋值）
var x = 100;
// let 和 const 的暂时性死区
console.log(y); // 报错：Cannot access 'y' before initialization
let y = 200;
console.log(z); // 报错：Cannot access 'z' before initialization
const z = 300;
3. 重复声明（Redeclaration）
var：允许重复声明同一变量，后续声明会覆盖前一次的值。
let 和 const：禁止重复声明同一变量，否则会抛出SyntaxError。
代码示例：

// var 允许重复声明
var a = 1;
var a = 2; // 合法，a 的值变为 2
console.log(a); // 输出 2
// let 和 const 禁止重复声明
let b = 1;
let b = 2; // 报错：Identifier 'b' has already been declared
const c = 1;
const c = 2; // 报错：Identifier 'c' has already been declared
4. 重新赋值（Reassignment）
var 和 let：允许重新赋值。
const：不允许重新赋值，但如果是对象或数组，可以修改其内部属性或元素（引用本身不可变）。
代码示例：

// var 和 let 允许重新赋值
var x = 10;
x = 20; // 合法
console.log(x); // 输出 20
let y = 30;
y = 40; // 合法
console.log(y); // 输出 40
// const 不允许重新赋值
const z = 50;
z = 60; // 报错：Assignment to constant variable.
// const 对象的内部属性可修改
const obj = { name: "Alice" };
obj.name = "Bob"; // 合法
console.log(obj); // 输出 { name: "Bob" }
// const 数组的内部元素可修改
const arr = [1, 2, 3];
arr.push(4); // 合法
console.log(arr); // 输出 [1, 2, 3, 4]
5. 全局对象绑定
var：在全局作用域中声明的变量会成为全局对象（如浏览器中的window对象）的属性。
let 和 const：不会绑定到全局对象。
代码示例：

// var 声明的变量会绑定到 window 对象
var globalVar = "I'm global!";
console.log(window.globalVar); // 输出 "I'm global!"
// let 和 const 声明的变量不会绑定到 window 对象
let blockScopedLet = "I'm block-scoped";
const blockScopedConst = "I'm also block-scoped";
console.log(window.blockScopedLet); // 输出 undefined
console.log(window.blockScopedConst); // 输出 undefined
三、最佳实践
优先使用 const：如果变量不需要重新赋值，使用const可以增强代码的可读性和安全性。
需要重新赋值时使用 let：当变量需要修改时，使用let。
避免使用 var：由于var的作用域和变量提升问题，容易引发难以调试的错误，建议尽量避免使用。 -->

<body>

    <script>
        const PI = 3.14159;
        PI = 3.14; // This will cause an error
        console.log(PI);
    </script>

</body>
