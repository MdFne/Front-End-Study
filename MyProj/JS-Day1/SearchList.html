<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .main {
            width: 400px;
            margin: 50px auto;
        }

        .main input {
            width: 100%;
            height: 40px;
            font-size: medium;
            padding: 0 0 0 8px;
            margin: 0;
        }

        .result {
            display: none;
            width: 395px;
            top: 74px;
            font-size: medium;
            list-style: none;
            padding-left: 4px;
            border: 1px solid #a8a8a8;
            position: absolute;
        }
    </style>
</head>

<body>
    <div class="main">
        <input type="search" placeholder="请输入搜索内容">
        <ul class="result">
            <li>搜索结果1</li>
            <li>搜索结果2</li>
            <li>搜索结果3</li>
            <li>搜索结果4</li>
            <li>搜索结果5</li>
            <li>搜索结果6</li>
        </ul>
    </div>

    <script>
        const input = document.querySelector('input')
        const result = document.querySelector('.result')

        input.addEventListener('focus', function () {
            result.style.display = 'block'
        })

        input.addEventListener('blur', function () {
            result.style.display = 'none'
        })
    </script>
</body>

</html>
