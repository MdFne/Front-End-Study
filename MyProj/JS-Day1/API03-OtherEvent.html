    <style>
        body {
            height: 3000px;
        }
        div {
            margin: 100px;
            width: 200px;
            height: 200px;
            border: 1px solid;
            overflow: scroll;
        }
    </style>
</head>

<body>
    <button>ClickMe</button>
    <div>
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
        SomethingInThere
    </div>

    <div>模拟悬浮窗</div>

    <script>
        // window.addEventListener('scroll', function() {
        //     console.log(11)
        //     // 给window和document加都可以
        // })
        const div = document.querySelector('div')
        div.addEventListener('scroll', function() {
            console.log(div.scrollTop)
            // 获取被卷去的距离，单位px，scrollLeft同理
        })

        window.addEventListener('scroll', function() {
            // 使用document.documentElement代表html元素，兼容性更好
            console.log(document.documentElement.scrollTop)
            // 获取被卷去的距离，单位px，scrollLeft同理
            if(document.documentElement.scrollTop > 200) {
                document.querySelectorAll('div')[1].style.display = 'block'
            } else {
                document.querySelectorAll('div')[1].style.display = 'none'
            }
        })
    </script>
</body>

</html>
