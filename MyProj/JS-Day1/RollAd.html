<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .main {
            width: 600px;
            height: 400px;
            border: 1px solid #000000;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .picArea {
            width: 600px;
            height: 300px;
            background-color: lightblue;
        }

        .picArea.active {
            width: 600px;
            border: 5px solid #6e6e6e;
            background-color: lightseagreen;
        }

        .contentArea {
            width: 600px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .text {
            width: 100%;
            height: 80px;
            background-color: lightcoral;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .txt {
            width: 400px;
            height: 50px;
            background-color: lightyellow;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dot {
            width: 100%;
            height: 20px;
            background-color: lightgreen;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;

        }

        .dot li {
            list-style: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #565656;
        }

        .dot li.active {
            width: 10px;
            height: 10px;
            background-color: #000000;
        }

        .btn {
            width: 120px;
            height: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-left: 30px;
            padding-top: 15px;
        }

        .btn button {
            width: 50px;
            height: 35px;
            border-radius: 5%;
            border: 1px solid #585858;
            color: #565656;
        }

        .btn button:hover {
            background-color: #a4a4a4;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="picArea"></div>
        <div class="contentArea">
            <div class="dot">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </div>
            <div class="text">
                <div class="txt"></div>
                <div class="btn">
                    <button> ⬅ </button>
                    <button> ➡ </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const arr = ["lightblue", "lightcoral", "lightgreen", "lightyellow", "lightpink"]
        const txt = ["第一张图片", "第二张图片", "第三张图片", "第四张图片", "第五张图片"]
        const picArea = document.querySelector('.picArea')
        const dots = document.querySelectorAll('.dot li')
        const btns = document.querySelectorAll('.btn button')
        const text = document.querySelector('.text')
        const txtDiv = document.querySelector('.txt')
        let index = 0

        let timer = null;
        function updateView() {
            picArea.style.backgroundColor = arr[index]
            txtDiv.textContent = txt[index]
            dots.forEach(function (dot, i) {
                if (i === index) {
                    dot.classList.add('active')
                } else {
                    dot.classList.remove('active')
                }
            })
        }

        function next() {
            index++
            if (index >= arr.length) {
                index = 0
            }
            updateView();
        }

        function startTimer() {
            // 防止已有定时器
            if (timer) clearInterval(timer)
            timer = setInterval(next, 1000)
        }

        function pauseAndRestart() {
            // 停止当前轮播
            if (timer) clearInterval(timer)
            // 2 秒后继续
            setTimeout(startTimer, 2000)
        }

        // 初始化
        startTimer();
        updateView();

        btns[0].addEventListener('click', function () {
            index--
            if (index < 0) {
                index = arr.length - 1
            }
            updateView();
            pauseAndRestart()
        })

        btns[1].addEventListener('click', function () {
            next();
            pauseAndRestart()
        })

        // 鼠标经过图片则暂停轮播，离开则继续
        picArea.addEventListener('mouseenter', function () {
            if (timer) clearInterval(timer)
            picArea.classList.add('active')
        })
        picArea.addEventListener('mouseleave', function () {
            startTimer()
            picArea.classList.remove('active')
        })

    </script>
</body>

</html>
