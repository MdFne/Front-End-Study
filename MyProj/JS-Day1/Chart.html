<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: flex;
            width: 800px;
            height: 600px;
            border-left: 1px solid #000000;
            border-bottom: 1px solid #000000;
            margin: 50px auto;
            justify-content: space-around;
            align-items: flex-end;
            text-align: center;
            background-color: #f4f4f4;
        }

        .box div {
            display: flex;
            width: 50px;
            background-color: rgb(92, 129, 162);
            flex-direction: column;
            justify-content: space-between;
        }

        .box>div>span {
            margin-top: -30px;
        }

        .box div h4 {
            margin-bottom: -50px;
            width: 80px;
            margin-left: -10px;
        }
    </style>
</head>

<body>

    <script>
        let arr = []
        for (let i = 0; i < 4; i++) {
            arr.push(+prompt('请输入第' + (i + 1) + '个月的销售额'))
        }

        document.write(`<div class="box">`)
        for (let i = 0; i < arr.length; i++) {
            document.write(`
                <div style="height: ${arr[i]}px;">
                    <span>${arr[i]}元</span>
                    <h4>第${i + 1}个月</h4>
                </div>
            `)
        }
        document.write(`</div>`)
    </script>
</body>

</html>
