<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        const Person = {
            eyes: 2,
            head: 1
        }

        // 女人 构造函数
        function Woman() {
        }
        // 女人 继承 人类
        const red = new Woman()

        function Man() {

        }

        // Woman 通过原型来继承 Person
        Woman.prototype = new Person()  // 子类原型 = new 父类（），Woman和Man互不影响
        // 指回原来的构造函数
        Woman.prototype.constructor = Woman
        Woman.prototype.baby = function () {
            console.log('baby')

        }

        Man.prototype = new Person()
        // 指回原来的构造函数
        Man.prototype.constructor = Man

        console.log(red)
        // console. Log(Woman.prototype)

    </script>
</body>

</html>
