<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul>
        <li>Item 1</li>
    </ul>

    <script>
        // 1.createElement('tag')方法用于创建一个新的元素节点，参数是要创建的元素的标签名
        const div = document.createElement('div') // 创建一个新的div元素
        div.textContent = 'Hello World' // 设置div的文本内容
        // 2.appendChild()方法用于将一个节点添加到另一个节点的子节点列表的末尾
        document.body.appendChild(div) // 将div添加到body的末尾

        const ul = document.querySelector('ul')
        const li2 = document.createElement('li') // 创建一个新的li元素
        li2.textContent = 'Item 2' // 设置li的文本内容
        // 3.insertBefore方法用 于将一个节点插入到另一个节点之前
        ul.insertBefore(li2, ul.firstChild) // 将li2插入到ul的第一个子节点之前，即插入到ul的开头

    </script>
</body>

</html>
