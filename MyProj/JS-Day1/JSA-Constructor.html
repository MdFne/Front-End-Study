<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 每个原型对象里面都有个constructor属性(constructor 构造函数)
        // 该属性指向该原型对象的构造函数,简单理解,就是指向我的爸爸,我是有爸爸的孩子
        // 构造函数.prototype ------>  原型对象
        // 构造函数    <-------------  原型对象.constructor

        function Person() {

        }

        Person.prototype = {
            // 赋值方法会覆盖掉原先的constructor，所以要指回构造函数
            constructor: Person,
            say: function () {
                console.log('hi')
            },
            talk: function () {
                console.log('hello')
            }
        }
    </script>
</body>

</html>
