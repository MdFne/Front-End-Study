<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .list {
            width: 800px;
            height: 500px;
            border: 1px solid #000;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .good {
            width: 200px;
            height: 250px;
            /* border: 1px solid #000; */
            margin: 0px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease-in-out;
        }

        .good:hover {
            transform: translate(0px, -10px);

            p {
                font-weight: bold;
            }
        }

        .good * {
            margin: 0px;
        }

        .good img {
            width: 150px;
            height: 150px;
        }

        .good p {
            width: 150px;

            text-align: center;
        }

        .good .name {
            height: 50px;
            font-size: 16px;
        }

        .good .price {
            height: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>
