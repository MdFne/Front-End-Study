<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS方式 */
        .box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid blue;
        }

        #circle {
            width: 100px;
            height: 100px;
            background-color: lightgreen;
            border: 2px solid green;
            border-radius: 50%;
            margin: 50px auto;
        }
    </style>
</head>

<body>
    <div class="box">
        <div id="circle">
        </div>
    </div>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>


    <script>
        // 1. 根据CSS选择器获取元素
        const boxElement = document.querySelector('.box') // 选择匹配的第一个元素
        // const boxElements = document.querySelectorAll('.box') // 选择所有匹配的元素，返回NodeList集合
        // const boxElement = document.querySelector('div') // 选择第一个div元素
        const circleElement = document.querySelector('#circle') // 选择id为circle的元素
        const firstlistItems = document.querySelector('ul li:first-child') // 选择ul下的第一个li元素
        const alllistItems = document.querySelectorAll('ul li') // 选择ul下的所有li元素，返回NodeList伪数组
        console.dir(boxElement)
        console.dir(circleElement)
        console.dir(firstlistItems)
        // 伪数组：无pop/push等数组方法，但可以通过索引和length属性访问，例如for遍历
        console.dir(alllistItems)
        for (let i = 0; i < alllistItems.length; i++) {
            console.log(alllistItems[i].textContent) // textContent获取元素的文本内容
        }
        for (const item of alllistItems) {
            console.log(item.textContent)
        }
        // 2. 其他获取元素的方法
        const ulElement = document.getElementsByTagName('ul')[0] // 根据标签名获取元素，返回HTMLCollection伪数组
        const liElements = document.getElementsByClassName('item') // 根据类名获取元素，返回HTMLCollection伪数组
        const circleById = document.getElementById('circle') // 根据id获取元素

    </script>
</body>

</html>
