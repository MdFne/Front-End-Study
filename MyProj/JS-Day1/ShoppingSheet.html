<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2 {
            text-align: center;
            /* 标题居中 */
        }

        table {
            border-collapse: collapse;
            /* 合并相邻边框 */
            height: 80px;
            margin: 0 auto;
            /* 表格水平居中 */
            text-align: center;
            /* 单元格内容居中 */
        }

        th {
            padding: 5px 30px;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
</head>

<body>

    <h2>订单确认</h2>

    <script>
        let name = prompt('收货人姓名')
        let price = +prompt('商品单价')
        let quanty = +prompt('购买数量')
        let addr = prompt('收货地址')

        let total = price * quanty

        document.write(`
            <table>
                <tr>
                    <th>商品名称</th>
                    <th>商品单价</th>
                    <th>商品数量</th>
                    <th>总价</th>
                    <th>收货人</th>
                    <th>收货地址</th>
                </tr>
                <tr>
                    <th>小米手机Mi12</th>
                    <th>${price}元</th>
                    <th>${quanty}</th>
                    <th>${total}元</th>
                    <th>${name}先生/女士</th>
                    <th>${addr}</th>
                </tr>
            </table>
        `)

    </script>

</body>

</html>
