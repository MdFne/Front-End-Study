<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        // 构造函数 公共的属性和方法 封装到构造函数中
        // 这种方法存在浪费内存的问题
        function Person(uname, age) {
            // 构造函数的this指向创建的实例对象
            this.uname = uname
            this.age = age
            // 不同对象的方法会重复储存在堆中，创建的越多重复储存的越多
            this.say = function () {
                console.log('hello')
            }
        }

        const wyx = new Person('wyx', 21)
        const czl = new Person('czl', 21)
        console.log(wyx.say === czl.say)    // FALSE

        // 构造函数通过原型分配的函数是所有对象所共享的。
        // JavaScript规定,每一个构造函数都有一个prototype属性,指向另一个对象,所以我们也称为原型对象
        // 这个proto对象可以挂载函数,对象实例化不会多次创建原型上函数,节约内存
        // 我们可以把那些不变的方法,直接定义在prototype对象上,这样所有对象的实例就可以共享这些方法。
        // 构造函数和原型对象中的this都指向 实例化的对象

        console.dir(Person.prototype)

        // 公共属性写到构造函数里，公共方法写到原型里
        Person.prototype.talk = function () {
            // 原型方法里的this指向函数调用者
            console.log('how are you')
        }

        console.log(wyx.talk === czl.talk)    // true
    </script>

</body>

</html>
