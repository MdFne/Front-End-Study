<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则表达式学习笔记</title>
</head>

<body>

    <script>
        /* ============================================================
           正则表达式(Regular Expression)简介
           ============================================================
           正则表达式是用于匹配字符串中字符组合的模式。
           在JavaScript中，正则表达式也是对象，通常用来查找、替换那些符合正则表达式的文本。
           许多编程语言都支持正则表达式。
        */

        /* ============================================================
           一、正则表达式的创建方式
           ============================================================ */

        // 1. 利用字面量创建正则表达式
        let reg = /abc/
        console.log(reg)

        // 2. 利用构造函数创建正则表达式
        let reg1 = new RegExp('abc')
        console.log(reg1)

        /* ============================================================
           二、正则表达式的测试方法
           ============================================================ */

        // test() 方法：检测字符串是否符合正则表达式规则
        // 返回值：符合返回 true，不符合返回 false
        console.log(reg.test('abc'))   // true
        console.log(reg.test('a123'))  // false

        // exec() 方法：检索字符串中符合正则表达式的子字符串
        // 返回值：找到返回数组（包含匹配信息），未找到返回 null
        console.log(reg.exec('abc'))   // ['abc', index: 0, input: 'abc', groups: undefined]
        console.log(reg.exec('a123'))  // null

        /* ============================================================
           三、元字符详解
           元字符是正则表达式中的特殊字符，用于匹配特殊字符或字符组合
           ============================================================ */

        // -------------------- 3.1 边界符 --------------------
        // ^  匹配字符串的开始位置
        // $  匹配字符串的结束位置

        console.log(/^abc/.test('abc123'))  // true  - 以abc开头
        console.log(/abc$/.test('123abc'))  // true  - 以abc结尾
        console.log(/^abc$/.test('abc'))    // true  - 精确匹配abc
        console.log(/^abc$/.test('abca'))   // false - 精确匹配，必须是abc

        // -------------------- 3.2 量词 --------------------
        // *      匹配前面的元素 0次或多次
        // +      匹配前面的元素 1次或多次
        // ?      匹配前面的元素 0次或1次
        // {n}    匹配前面的元素 恰好n次
        // {n,}   匹配前面的元素 至少n次
        // {n,m}  匹配前面的元素 n到m次

        // -------------------- 3.3 字符类 --------------------
        // [abc]        匹配方括号中的任意一个字符
        // [^abc]       匹配除了方括号中的任意一个字符
        // [a-z]        匹配任意小写字母
        // [A-Z]        匹配任意大写字母
        // [0-9]        匹配任意数字
        // [a-zA-Z0-9]  匹配任意字母、数字
        // [^a-z]       匹配除了小写字母以外的任意字符

        /* ============================================================
           四、常用元字符速查表
           ============================================================ */

        /* -------------------- 基本元字符 --------------------
           . (点号)
           匹配除换行符(\n)外的任意单个字符
           示例：a.b 匹配 "aab", "a1b", "a b" 等

           ^ (脱字符)
           匹配字符串的开始位置
           示例：^abc 匹配以 "abc" 开头的字符串

           $ (美元符)
           匹配字符串的结束位置
           示例：xyz$ 匹配以 "xyz" 结尾的字符串

           \ (反斜杠)
           转义字符，使后面的字符失去特殊含义
           示例：\. 匹配实际的点号而不是任意字符
        */

        /* -------------------- 字符类元字符 --------------------
           [] (方括号)
           定义字符集合，匹配其中任意一个字符
           示例：[aeiou] 匹配任意一个元音字母

           [^] (否定字符类)
           匹配不在方括号中的任意字符
           示例：[^0-9] 匹配任意非数字字符

           - (连字符)
           在字符类中表示范围
           示例：[a-z] 匹配任意小写字母
        */

        /* -------------------- 量词元字符 --------------------
           * (星号)
           匹配前面的子表达式零次或多次
           示例：ab*c 匹配 "ac", "abc", "abbc" 等

           + (加号)
           匹配前面的子表达式一次或多次
           示例：ab+c 匹配 "abc", "abbc" 但不匹配 "ac"

           ? (问号)
           匹配前面的子表达式零次或一次
           示例：colou?r 匹配 "color" 和 "colour"

           {n} (花括号)
           精确匹配n次
           示例：a{3} 匹配 "aaa"

           {n,}
           至少匹配n次
           示例：a{2,} 匹配 "aa", "aaa" 等

           {n,m}
           匹配n到m次
           示例：a{2,4} 匹配 "aa", "aaa", "aaaa"
        */

        /* -------------------- 分组和选择元字符 --------------------
           () (圆括号)
           定义子表达式或捕获组
           示例：(ab)+ 匹配 "ab", "abab" 等

           | (竖线)
           表示"或"关系
           示例：cat|dog 匹配 "cat" 或 "dog"
        */

        /* -------------------- 特殊字符类元字符 --------------------
           \d    匹配任意数字，等价于 [0-9]
           \D    匹配任意非数字，等价于 [^0-9]
           \w    匹配任意单词字符(字母、数字、下划线)，等价于 [a-zA-Z0-9_]
           \W    匹配任意非单词字符，等价于 [^a-zA-Z0-9_]
           \s    匹配任意空白字符(空格、制表符、换行符等)
           \S    匹配任意非空白字符
        */

        /* -------------------- 边界匹配元字符 --------------------
           \b    匹配单词边界
                  示例：\bcat\b 匹配 "cat" 但不匹配 "category"

           \B    匹配非单词边界
                  示例：\Bcat\B 匹配 "scattered" 中的 "cat" 但不匹配单独的 "cat"
        */

        /* -------------------- 其他特殊字符 --------------------
           \n    匹配换行符
           \t    匹配制表符
           \r    匹配回车符
           \f    匹配换页符
           \v    匹配垂直制表符
        */

        /* ============================================================
           五、贪婪与非贪婪量词
           ============================================================
           默认情况下，量词(*, +, ?, {})是贪婪的，会尽可能多地匹配字符。
           在量词后加?可使其变为非贪婪(懒惰)模式：

           *?      零次或多次，但尽可能少
           +?      一次或多次，但尽可能少
           ??      零次或一次，但尽可能少
           {n,m}?  n到m次，但尽可能少

           示例：<.*?> 匹配HTML标签时不会跨标签匹配
        */

        /* ============================================================
           六、正向和负向预查（断言）
           ============================================================ */

        // (?=...)   正向肯定预查
        //           匹配后面跟着特定模式的位置
        //           示例：Windows(?=95|98) 匹配后面跟着95或98的"Windows"

        // (?!...)   正向否定预查
        //           匹配后面不跟着特定模式的位置
        //           示例：Windows(?!95|98) 匹配后面不跟着95或98的"Windows"

        // (?<=...)  反向肯定预查
        //           匹配前面是特定模式的位置
        //           示例：(?<=95|98)Windows 匹配前面是95或98的"Windows"

        // (?<!...)  反向否定预查
        //           匹配前面不是特定模式的位置
        //           示例：(?<!95|98)Windows 匹配前面不是95或98的"Windows"

        // /i  忽略大小写
        // /g  全局匹配

        // replace() 方法
        // 用于在字符串中替换匹配的子字符串
        // 语法：str.replace(regexp|substr, newSubStr|function)
        // 示例："hello world".replace("world", "universe")  返回 "hello universe"
        const str = 'java是一门编程语言,学完JAVA工资很高'
        const re = str.replace(/java/ig, '前端') // 全局匹配(两个Java都会被替换),忽略大小写
        console.log(re)




        // 用户名验证案例
        // 需求:用户名要求用户英文字母,数字,下划线或者短横线组成,并且用户名长度为6~16位
        // 分析:
        //  1:首先准备好这种正则表达式模式/^[a-zA-Z0-9-_]{6,16}$/
        //  2:当表单失去焦点就开始验证.
        //  3:如果符合正则规范,则让后面的span标签添加right类.
        //  4:如果不符合正则规范,则让后面的span标签添加 wrong类.
    </script>
</body>

</html>
