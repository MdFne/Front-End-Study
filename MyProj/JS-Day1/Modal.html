<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="btn">
        <button id="delete">删除</button>
        <button id="login">登录</button>
    </div>

    <script>
        // 1.modal 构造函数封装
        function Modal(title = '温馨提示', msg = '您没有权限') {
            // 创建modal模态框盒子
            // 1.1 创建div标签
            this.modalBox = document.createElement('div')
            // 1.2 给div标签添加类名为modal
            this.modalBox.className = 'modal'
            // 1.3 modal盒子内部填充2个div并修改文字内容
            this.modalBox.innerHTML = `
                <div class="header">${title} <i>x</i></div>
                <div class="body">${msg}</div>
            `
            console.log(this.modalBox)
        }

        // 2. 给构造函数原型对象挂载open
        Modal.prototype.open = function () {
            // bug处理：先判断页面中有没有modal盒子，如果有先删除
            const box = document.querySelector('.modal')
            box && box.remove()

            // 注意不要用箭头
            // 把刚才创建的modalBox显示到body中
            document.body.append(this.modalBox)

            // 等着盒子显示出来，再绑定关闭事件
            this.modalBox.querySelector('i').addEventListener('click', () => {
                // 这里要用箭头函数，this绑定在prototype身上
                this.close()
            })


        }

        // 3. 给构造函数原型对象挂载close
        // 关闭按钮在模态框里，要把绑定事件写到open方法里
        Modal.prototype.close = function () {
            this.modalBox.remove()
        }

        document.querySelector('#delete').addEventListener('click', () => {
            const del = new Modal('温馨提示', '你没有删除操作的权限')
            del.open()
        })
    </script>

</body>

</html>
