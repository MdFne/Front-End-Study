<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios发送Ajax</title>
    <script crossorigin="anonymous" src="https://cdn.bootcdn.net/ajax/libs/axios/1.11.0/axios.js"></script>
</head>

<body>
    <button>GET</button>
    <button>POST</button>
    <button>AJAX</button>

    <script>
        const btns = document.querySelectorAll('button')

        // 配置baseURL，下面直接写二级路径
        axios.defaults.baseURL = 'http://127.0.0.1:8000'

        btns[0].onclick = function () {
            // GET
            axios.get('/axios', {
                // url参数
                params: {
                    id: 100,
                    vip: 7
                },
                // 请求头信息
                headers: {
                    name: 'ECNU'
                }
            }).then(value => {
                console.log(value);

            })
        }

        btns[1].onclick = function () {
            // POST(url，请求体，其他配置)
            axios.post('/axios',
                // 请求体
                {
                    uname: 'aaa'
                },
                {
                    // url参数
                    params: {
                        id: 100,
                        vip: 7
                    },
                    // 请求头信息
                    headers: {
                        name: 'ECNU'
                    },

                }).then(value => {
                    console.log(value);

                })
        }

        btns[2].onclick = function () {
            axios({
                // 请求方法
                method: 'POST',
                //ur1
                url: '/axios',
                //ur1参数
                params: {
                    vip: 10,
                    level: 30
                },
                //头信息
                headers: {
                    a: 100,
                    b: 200
                },

                //请求体参数
                data: {
                    username: 'admin',
                    password: 'admin'
                }
            })
        }
    </script>

</body>

</html>
